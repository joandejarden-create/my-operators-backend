<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Review Dashboard</title>
    <style>
        /* Webflow-specific styles */
        .webflow-dashboard {
            font-family: 'Mona sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #080F25;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #aeb9e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
        
        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }
        
        .brand-selector {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #ffffff;
            font-size: 1rem;
            min-width: 200px;
        }
        
        .dashboard-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dashboard-tab {
            color: #aeb9e1;
            text-decoration: none;
            font-weight: 500;
            padding: 1rem 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .dashboard-tab:hover,
        .dashboard-tab.active {
            color: #ffffff;
            border-bottom-color: #667eea;
        }
        
        .tab-count {
            background: rgba(255, 255, 255, 0.1);
            color: #aeb9e1;
            border-radius: 12px;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        
        .dashboard-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        
        .bulk-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .brand-selection-right {
            display: flex;
            align-items: center;
        }
        
        .bulk-select {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            color: #ffffff;
            font-size: 0.9rem;
        }
        
        .filter-btn {
            background: #d69e2e;
            border: 1px solid #d69e2e;
            color: #fff;
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            background: #b8860b;
            border-color: #b8860b;
            color: #fff;
            transform: translateY(-1px);
        }
        
        .deals-table {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-header {
            background: #080f25;
            padding: 0.75rem 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1.5fr 1.75fr 1fr 1fr 1fr;
            gap: 0.25rem;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-header-item {
            color: #aeb9e1;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
            padding-left: 0;
        }
        
        /* Sortable header styles */
        .table-header-item.sortable {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        
        .table-header-item.sortable:hover {
            color: #ffffff;
        }
        
        .sort-arrows {
            display: flex;
            flex-direction: column;
            margin-right: 0.5rem;
            gap: 1px;
        }
        
        .sort-arrow {
            font-size: 0.6rem;
            color: #aeb9e1;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s ease;
        }
        
        .sort-arrow:hover {
            color: #ffffff;
        }
        
        .sort-arrow.active {
            color: #667eea;
        }
        
        .table-row {
            padding: 0.0075rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1.5fr 1.75fr 1fr 1fr 1fr;
            gap: 0.25rem;
            align-items: center;
            transition: all 0.3s ease;
            min-height: auto;
            font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .table-row.status-new {
            font-weight: bold;
        }
        
        .table-row.status-viewed-by-brand {
            font-weight: normal;
        }
        
        .table-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .status-text {
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 0.3px;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }
        
        .status-new {
            color: #22c55e;
        }
        
        .status-viewed-by-brand,
        .status-deal-received,
        .status-closed-won,
        .status-closed-lost,
        .status-awarded,
        .status-in-negotiation,
        .status-shortlisting,
        .status-in-discovery,
        .status-on-hold,
        .status-deferred,
        .status-expired,
        .status-archived,
        .status-active,
        .status-declined {
            color: #ffffff;
        }
        
        .brand-match {
            color: #ffffff;
            font-size: 14px;
        }
        
        .match-score {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            margin: 0 auto;
        }
        
        .match-score-disabled {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            margin: 0 auto;
            color: #666;
            background-color: #333;
            border: 1px solid #555;
        }
        
        .score-high {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 2px solid rgba(34, 197, 94, 0.3);
        }
        
        .score-medium {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 2px solid rgba(251, 191, 36, 0.3);
        }
        
        .score-low {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 2px solid rgba(239, 68, 68, 0.3);
        }

        .match-score-with-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .match-score-info-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateX(-30px);
            width: 26px;
            height: 26px;
        }

        .match-score-info-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .match-score-info-btn:disabled {
            color: #666;
            cursor: not-allowed;
        }
        
        .match-score-info-btn:disabled:hover {
            color: #666;
            background: transparent;
        }

        .match-score-info-btn svg {
            width: 18px;
            height: 18px;
        }
        
        .deal-contact {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .contact-info {
            flex: 1;
        }
        
        .contact-name {
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 0.25rem;
        }

        .contact-title {
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 0.25rem;
        }
        
        .contact-company {
            color: #ffffff;
            font-size: 14px;
        }

        /* Deal Headline Styles */
        .deal-headline {
            color: #ffffff;
            font-size: 14px;
            line-height: 1.2;
            width: 100%;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: block;
            padding: 0.1rem 0;
        }

        /* Responsiveness Badge Styles */
        .responsiveness-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: fit-content;
        }

        .responsiveness-icons {
            font-size: 0.8rem;
        }

        .responsiveness-label {
            color: #ffffff;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* Responsiveness Badge Color Variations */
        .responsiveness-badge[data-score="90-100"] {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.4);
        }

        .responsiveness-badge[data-score="70-89"] {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .responsiveness-badge[data-score="50-69"] {
            background: rgba(251, 191, 36, 0.2);
            border-color: rgba(251, 191, 36, 0.4);
        }

        .responsiveness-badge[data-score="30-49"] {
            background: rgba(249, 115, 22, 0.2);
            border-color: rgba(249, 115, 22, 0.4);
        }

        .responsiveness-badge[data-score="0-29"] {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* Match Score Info Icon */
        .info-icon {
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 0.25rem;
            opacity: 0.7;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .info-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .match-score-with-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            padding: 0;
        }
        
        /* Center Match Score column header and content */
        .table-header-item:nth-child(3),
        .table-row > div:nth-child(3) {
            text-align: center;
            padding-left: 0;
            padding-right: 0;
            justify-content: center;
        }
        
        /* Center Call to Action column header and content */
        .table-header-item:nth-child(8),
        .table-row > div:nth-child(8) {
            text-align: center;
            padding-left: 0;
            padding-right: 0;
            justify-content: center;
            display: flex;
            align-items: center;
        }
        
        /* Move Response Times header 10px to the left */
        .table-header-item:nth-child(6) {
            transform: translateX(-10px);
        }
        
        /* Move Deal Details header 10px to the left */
        .table-header-item:nth-child(7) {
            transform: translateX(-10px);
        }
        
        /* Move Match Score header 10px to the left */
        .table-header-item:nth-child(3) {
            transform: translateX(-10px);
        }

        /* Scoring Breakdown Modal */
        .scoring-breakdown-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }

        .scoring-breakdown-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .scoring-breakdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .scoring-breakdown-title {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .scoring-breakdown-close {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .scoring-breakdown-close:hover {
            opacity: 1;
        }

        .scoring-breakdown-total {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .scoring-breakdown-total-score {
            font-size: 2rem;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 0.5rem;
        }

        .scoring-breakdown-total-label {
            color: #ffffff;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .scoring-criteria {
            display: grid;
            gap: 1rem;
        }

        .scoring-criterion {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 1rem;
            border-left: 4px solid transparent;
        }

        .scoring-criterion.excellent {
            border-left-color: #10b981;
        }

        .scoring-criterion.good {
            border-left-color: #3b82f6;
        }

        .scoring-criterion.average {
            border-left-color: #f59e0b;
        }

        .scoring-criterion.poor {
            border-left-color: #ef4444;
        }

        .criterion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .criterion-name {
            color: #ffffff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .criterion-score {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .criterion-score.excellent {
            color: #10b981;
        }

        .criterion-score.good {
            color: #3b82f6;
        }

        .criterion-score.average {
            color: #f59e0b;
        }

        .criterion-score.poor {
            color: #ef4444;
        }

        .criterion-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            line-height: 1.4;
        }

        .criterion-weight {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* Learn More Modal */
        .learn-more-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            backdrop-filter: blur(4px);
        }

        .learn-more-content {
            background: white;
            border-radius: 12px;
            max-width: 95vw;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            width: 1000px;
        }

        /* Match Score Details Modal */
        .match-score-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10002;
            backdrop-filter: blur(4px);
        }

        .match-score-content {
            background: #1f2937;
            border-radius: 12px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            width: 90%;
            padding: 24px;
        }

        .match-score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #374151;
        }

        .match-score-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .match-score-close {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .match-score-close:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .match-score-overview {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .match-score-badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
        }

        .match-score-info {
            flex: 1;
        }

        .match-score-value {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 4px 0;
        }

        .match-score-description {
            color: #9ca3af;
            font-size: 14px;
            margin: 0;
        }

        .match-score-breakdown {
            margin-bottom: 24px;
        }

        .breakdown-title {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 16px 0;
        }

        .score-factor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 4px solid;
        }

        .score-factor.high {
            border-left-color: #22c55e;
        }

        .score-factor.medium {
            border-left-color: #fbbf24;
        }

        .score-factor.low {
            border-left-color: #ef4444;
        }

        .factor-info {
            flex: 1;
        }

        .factor-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 2px 0;
        }

        .factor-description {
            color: #9ca3af;
            font-size: 12px;
            margin: 0;
        }
        
        .factor-commentary {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border-left: 3px solid #666;
            line-height: 1.4;
            white-space: pre-line;
        }
        
        .factor-commentary:before {
            content: "💡 ";
            margin-right: 4px;
        }

        .factor-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .factor-value {
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
        }

        .factor-weight {
            color: #6b7280;
            font-size: 12px;
        }

        /* Dealality Header */
        .deal-capture-header {
            background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10001;
            min-height: 120px;
        }

        .header-left {
            flex: 0 0 auto;
        }

        .deal-capture-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            background: #20B2AA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-image {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .logo-text {
            font-weight: bold;
        }

        .logo-line-1 {
            font-size: 16px;
            line-height: 1;
        }

        .logo-line-2 {
            font-size: 14px;
            line-height: 1;
            margin-top: 2px;
        }

        .header-center {
            flex: 1;
            text-align: center;
            padding: 0 20px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .property-location {
            font-size: 16px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .deal-type {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-right {
            flex: 0 0 auto;
            text-align: right;
            position: relative;
            padding-right: 50px;
        }

        .target-info {
            font-size: 14px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .room-info {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .learn-more-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
