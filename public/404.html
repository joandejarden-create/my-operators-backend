<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Dealality</title>
  <link rel="icon" type="image/png" href="https://cdn.prod.website-files.com/68108c29063eeb5d1bd7ae4a/69c166836c109719f94e055e_Dealality%20Logo%20(4)%20(1).png">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource-variable/mona-sans@5.0.0/index.min.css" rel="stylesheet">
  <style>
    :root { --neutral--800: #080f25; --neutral--300: #d1dbf9; --neutral--100: #fff; --accent--primary-1: #6c72ff; }
    body { margin: 0; font-family: 'Mona Sans Variable', sans-serif; background: var(--neutral--800); color: var(--neutral--300); padding: 80px 24px; text-align: center; min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { color: var(--neutral--100); font-size: 48px; margin: 0 0 16px; }
    p { font-size: 18px; margin: 0 0 32px; }
    a { color: var(--accent--primary-1); font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn { display: inline-block; padding: 12px 24px; background: var(--accent--primary-1); color: white; border-radius: 8px; margin: 0 8px; }
    .btn:hover { opacity: 0.9; text-decoration: none; }

</head>
