<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Brand Fit Analyzer™ - Dealality Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .deals-section {
            margin-bottom: 40px;
        }

        .section-title {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .deal-card {
            background: #f8f9fa;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .deal-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
        }

        .deal-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9fa 0%, #e3f2fd 100%);
        }

        .deal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .deal-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .deal-id {
            font-size: 0.9rem;
            color: #6c757d;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .deal-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 0.9rem;
            color: #2c3e50;
            font-weight: 500;
        }

        .deal-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: #d4edda;
            color: #155724;
        }

        .status-new {
            background: #cce5ff;
            color: #004085;
        }

        .status-archived {
            background: #f8d7da;
            color: #721c24;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .analyze-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-container {
            display: none;
            margin-top: 40px;
        }

        .results-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .results-header h2 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .deal-summary {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .deal-summary h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 1rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .insights-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #e1e8ed;
        }

        .insight-card {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .insight-card.high {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .insight-card.medium {
            border-left-color: #ffc107;
            background: #fffbf0;
        }

        .insight-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .insight-description {
            color: #6c757d;
        }

        .brand-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }

        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .fit-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .fit-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .breakdown-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .breakdown-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .breakdown-score {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .strengths, .concerns, .recommendations {
            margin-bottom: 20px;
        }

        .section-title-small {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title-small::before {
            content: '';
            width: 3px;
            height: 16px;
            background: #667eea;
            border-radius: 2px;
        }

        .strengths .section-title-small::before {
            background: #28a745;
        }

        .concerns .section-title-small::before {
            background: #dc3545;
        }

        .recommendations .section-title-small::before {
            background: #ffc107;
        }

        .item-list {
            list-style: none;
        }

        .item-list li {
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .item-list li:last-child {
            border-bottom: none;
        }

        .no-deals {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .no-deals h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 20px;
            }

            .deals-grid {
                grid-template-columns: 1fr;
            }

            .brand-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .fit-breakdown {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Deal Brand Fit Analyzer™</h1>
            <p>Analyze brand fit for your existing hotel deals using real market data</p>
        </div>

        <div class="content">
            <div class="deals-section">
                <h2 class="section-title">Select a Deal to Analyze</h2>
                <div class="deals-grid" id="dealsGrid">
                    <!-- Deals will be loaded here -->
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading deals...</p>
            </div>

            <div class="results-container" id="resultsContainer">
                <div class="results-header">
                    <h2>Brand Fit Analysis Results</h2>
                    <p>Based on deal data and market intelligence</p>
                </div>

                <div class="deal-summary" id="dealSummary">
                    <!-- Deal summary will be shown here -->
                </div>

                <div class="insights-section" id="insightsSection">
                    <h3>Market Insights</h3>
                    <div id="insightsList"></div>
                </div>

                <div id="brandResults"></div>
            </div>
        </div>
    </div>

    <script>
        class DealBrandFitAnalyzer {
            constructor() {
                this.deals = [];
                this.selectedDeal = null;
                this.loading = document.getElementById('loading');
                this.resultsContainer = document.getElementById('resultsContainer');
                this.dealsGrid = document.getElementById('dealsGrid');
                this.dealSummary = document.getElementById('dealSummary');
                this.brandResults = document.getElementById('brandResults');
                this.insightsList = document.getElementById('insightsList');
                
                this.loadDeals();
            }

            async loadDeals() {
                this.showLoading();
                
                try {
                    const response = await fetch('/api/brand-fit-analyzer/deals');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    this.deals = data.deals || [];
                    this.displayDeals();
                    
                } catch (error) {
                    console.error('Error loading deals:', error);
                    this.showError('Failed to load deals. Please try again.');
                } finally {
                    this.hideLoading();
                }
            }

            displayDeals() {
                if (this.deals.length === 0) {
                    this.dealsGrid.innerHTML = `
                        <div class="no-deals">
                            <h3>No Deals Found</h3>
                            <p>There are currently no deals available for brand fit analysis.</p>
                        </div>
                    `;
                    return;
                }

                const dealsHTML = this.deals.map(deal => `
                    <div class="deal-card" data-deal-id="${deal.id}">
                        <div class="deal-header">
                            <div>
                                <div class="deal-name">${deal.propertyName || 'Unnamed Property'}</div>
                                <div class="deal-id">Deal #${deal.id}</div>
                            </div>
                            <div class="deal-status status-${deal.status?.toLowerCase() || 'new'}">
                                ${deal.status || 'New'}
                            </div>
                        </div>
                        
                        <div class="deal-details">
                            <div class="detail-item">
                                <div class="detail-label">Location</div>
                                <div class="detail-value">${deal.city || 'Unknown'}, ${deal.country || 'Unknown'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Rooms</div>
                                <div class="detail-value">${deal.rooms || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Property Type</div>
                                <div class="detail-value">${deal.propertyType || 'Unknown'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Stage</div>
                                <div class="detail-value">${deal.stage || 'Unknown'}</div>
                            </div>
                        </div>
                        
                        <button class="analyze-btn" onclick="analyzer.analyzeDeal('${deal.id}')">
                            🚀 Analyze Brand Fit
                        </button>
                    </div>
                `).join('');
                
                this.dealsGrid.innerHTML = dealsHTML;
            }

            async analyzeDeal(dealId) {
                this.selectedDeal = this.deals.find(deal => deal.id === dealId);
                if (!this.selectedDeal) return;

                this.showLoading();
                
                try {
                    const response = await fetch(`/api/brand-fit-analyzer/deal?dealId=${dealId}`);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const results = await response.json();
                    this.displayResults(results);
                    
                } catch (error) {
                    console.error('Error analyzing deal:', error);
                    this.showError('Failed to analyze brand fit. Please try again.');
                } finally {
                    this.hideLoading();
                }
            }

            displayResults(results) {
                this.resultsContainer.style.display = 'block';
                
                // Display deal summary
                this.displayDealSummary(results.ownerInputs);
                
                // Display insights
                this.displayInsights(results.insights);
                
                // Display brand results
                this.displayBrandResults(results.brandFits);
                
                // Scroll to results
                this.resultsContainer.scrollIntoView({ behavior: 'smooth' });
            }

            displayDealSummary(ownerInputs) {
                const summaryHTML = `
                    <h3>Deal Summary</h3>
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">Property</div>
                            <div class="summary-value">${ownerInputs.roomCount} rooms, ${ownerInputs.targetSegment} ${ownerInputs.propertyType}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Location</div>
                            <div class="summary-value">${ownerInputs.location.city}, ${ownerInputs.location.country}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Asset Stage</div>
                            <div class="summary-value">${ownerInputs.assetStage}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">CapEx Tolerance</div>
                            <div class="summary-value">${ownerInputs.capExTolerance}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Operating Model</div>
                            <div class="summary-value">${ownerInputs.operationalPreferences.operatingModel}</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Guest Focus</div>
                            <div class="summary-value">${ownerInputs.guestDemandFocus}</div>
                        </div>
                    </div>
                `;
                
                this.dealSummary.innerHTML = summaryHTML;
            }

            displayInsights(insights) {
                if (!insights || !Array.isArray(insights)) {
                    this.insightsList.innerHTML = '<div class="insight-card medium"><div class="insight-title">No Insights Available</div><div class="insight-description">Unable to generate market insights at this time.</div></div>';
                    return;
                }

                const insightsHTML = insights.map(insight => `
                    <div class="insight-card ${insight.priority}">
                        <div class="insight-title">${insight.title}</div>
                        <div class="insight-description">${insight.description}</div>
                    </div>
                `).join('');
                
                this.insightsList.innerHTML = insightsHTML;
            }

            displayBrandResults(brandFits) {
                if (!brandFits || !Array.isArray(brandFits)) {
                    this.brandResults.innerHTML = '<div class="brand-card" style="border-left-color: #dc3545;"><div class="brand-header"><div class="brand-name" style="color: #dc3545;">No Results</div></div><p>No brand fit analysis results available.</p></div>';
                    return;
                }

                const brandsHTML = brandFits.map(brand => `
                    <div class="brand-card">
                        <div class="brand-header">
                            <div class="brand-name">${brand.brand}</div>
                            <div class="fit-score">${brand.fitScore}% Fit</div>
                        </div>
                        
                        <div class="fit-breakdown">
                            <div class="breakdown-item">
                                <div class="breakdown-label">Segment Fit</div>
                                <div class="breakdown-score">${brand.fitBreakdown.segmentFit}%</div>
                            </div>
                            <div class="breakdown-item">
                                <div class="breakdown-label">Geographic Fit</div>
                                <div class="breakdown-score">${brand.fitBreakdown.geographicFit}%</div>
                            </div>
                            <div class="breakdown-item">
                                <div class="breakdown-label">Property Fit</div>
                                <div class="breakdown-score">${brand.fitBreakdown.propertyFit}%</div>
                            </div>
                            <div class="breakdown-item">
                                <div class="breakdown-label">Financial Fit</div>
                                <div class="breakdown-score">${brand.fitBreakdown.financialFit}%</div>
                            </div>
                            <div class="breakdown-item">
                                <div class="breakdown-label">Operational Fit</div>
                                <div class="breakdown-score">${brand.fitBreakdown.operationalFit}%</div>
                            </div>
                        </div>

                        ${brand.strengths.length > 0 ? `
                            <div class="strengths">
                                <div class="section-title-small">Strengths</div>
                                <ul class="item-list">
                                    ${brand.strengths.map(strength => `<li>${strength}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}

                        ${brand.concerns.length > 0 ? `
                            <div class="concerns">
                                <div class="section-title-small">Concerns</div>
                                <ul class="item-list">
                                    ${brand.concerns.map(concern => `<li>${concern}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}

                        ${brand.recommendations.length > 0 ? `
                            <div class="recommendations">
                                <div class="section-title-small">Recommendations</div>
                                <ul class="item-list">
                                    ${brand.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
                
                this.brandResults.innerHTML = brandsHTML;
            }

            showLoading() {
                this.loading.style.display = 'block';
                this.resultsContainer.style.display = 'none';
            }

            hideLoading() {
                this.loading.style.display = 'none';
            }

            showError(message) {
                this.brandResults.innerHTML = `
                    <div class="brand-card" style="border-left-color: #dc3545;">
                        <div class="brand-header">
                            <div class="brand-name" style="color: #dc3545;">Error</div>
                        </div>
                        <p>${message}</p>
                    </div>
                `;
                this.resultsContainer.style.display = 'block';
            }
        }

        // Initialize the analyzer when the page loads
        let analyzer;
        document.addEventListener('DOMContentLoaded', () => {
            analyzer = new DealBrandFitAnalyzer();
        });
    </script>
</body>
</html>
